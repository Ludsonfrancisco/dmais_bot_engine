# =============================================================================
# dmais_bot_engine — Docker Compose
# =============================================================================
# 4 serviços: postgres, evolution-api, redis, worker
# Uso: docker compose up -d --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Banco de dados da EvolutionAPI v2
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: dmais_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evolution}
      - POSTGRES_DB=evolution
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "evolution", "-d", "evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # EvolutionAPI — Gateway WhatsApp (Baileys)
  # ---------------------------------------------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.5
    container_name: dmais_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Autenticação
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # Armazenamento (PostgreSQL obrigatório na v2)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${POSTGRES_PASSWORD:-evolution}@postgres:5432/evolution?schema=public
      # Instância padrão
      - DEL_INSTANCE=false
      # Logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Webhook global (aponta para o worker)
      - WEBHOOK_GLOBAL_URL=http://worker:${WORKER_HTTP_PORT:-8000}/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      # Workaround upstream issue #2437 (Pre-key upload timeout + stream 515)
      # — desabilita sync de histórico que sobrecarrega o Baileys no pareamento
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - DATABASE_SAVE_DATA_LABELS=false
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1033773198
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evolution-instances:/evolution/instances
      - evolution-store:/evolution/store
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8080/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — Filas, idempotência e rate-limit
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dmais_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Worker — Motor Python (FastAPI + Poller)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: dmais_worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WORKER_HTTP_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Volumes persistentes nomeados
# =============================================================================
volumes:
  # Sessões WhatsApp (QRCode pareado) — CRÍTICO: não apagar
  evolution-instances:
    name: dmais_evolution_instances

  # Store de mensagens da EvolutionAPI
  evolution-store:
    name: dmais_evolution_store

  # Dados do Redis (AOF para persistência)
  redis-data:
    name: dmais_redis_data

  # Banco de dados da EvolutionAPI v2
  postgres-data:
    name: dmais_postgres_data

# =============================================================================
# Rede interna
# =============================================================================
networks:
  dmais_net:
    name: dmais_net
    driver: bridge
