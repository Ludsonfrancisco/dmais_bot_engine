# =============================================================================
# dmais_bot_engine — Docker Compose
# =============================================================================
# 3 serviços: evolution-api, redis, worker
# Uso: docker compose up -d --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # EvolutionAPI — Gateway WhatsApp (Baileys)
  # ---------------------------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: dmais_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Autenticação
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      # Armazenamento
      - DATABASE_ENABLED=false
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      # Instância padrão
      - DEL_INSTANCE=false
      # Logs
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Webhook global (aponta para o worker)
      - WEBHOOK_GLOBAL_URL=http://worker:${WORKER_HTTP_PORT:-8000}/webhook/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
    volumes:
      - evolution-instances:/evolution/instances
      - evolution-store:/evolution/store
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — Filas, idempotência e rate-limit
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dmais_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Worker — Motor Python (FastAPI + Poller)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: dmais_worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WORKER_HTTP_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    networks:
      - dmais_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Volumes persistentes nomeados
# =============================================================================
volumes:
  # Sessões WhatsApp (QRCode pareado) — CRÍTICO: não apagar
  evolution-instances:
    name: dmais_evolution_instances

  # Store de mensagens da EvolutionAPI
  evolution-store:
    name: dmais_evolution_store

  # Dados do Redis (AOF para persistência)
  redis-data:
    name: dmais_redis_data

# =============================================================================
# Rede interna
# =============================================================================
networks:
  dmais_net:
    name: dmais_net
    driver: bridge
